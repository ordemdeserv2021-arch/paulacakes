<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paula Cakes 🎂 - Vitrine Inteligente</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="index.css"> 





</head>

<body>

    <!-- HERO: BRAND BANNER -->

    <body>

        <!-- BANNER DO TOPO CENTRALIZADO PREMIUM -->
        <div class="banner-paula-cakes">
            <div class="banner-conteudo-alinhado">

                <div class="banner-bloco-link">
                    <a href="https://www.instagram.com/anapaulasilva8579?igsh=dGFnOGdxdjRoNm1p" target="_blank"
                        class="banner-texto-esquerdo">
                        Cake Designer
                    </a>
                    <a href="https://www.instagram.com/anapaulasilva8579?igsh=dGFnOGdxdjRoNm1p" target="_blank"
                        class="icone-rede-social">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg"
                            alt="Instagram">
                    </a>
                </div>

                <div class="banner-logo-miolo">
                    <img src="img/logo-topo.jpg" alt="Logo Paula Cakes">
                </div>

                <div class="banner-bloco-link">
                    <a href="https://www.facebook.com/share/1E8wbHhkYL/" target="_blank" class="banner-texto-direito">
                        Paula Cakes
                    </a>
                    <a href="https://www.facebook.com/share/1E8wbHhkYL/" target="_blank" class="icone-rede-social">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg"
                            alt="Facebook">
                    </a>
                </div>

            </div>
        </div>


        <!-- Resto do seu código (Carrossel, Vitrine, etc.) -->
        <!-- 🎪 SEÇÃO DO CARROSSEL DE FOTOS EM DESTAQUE -->
        <div id="carrossel-area" class="carrossel-secao" style="display: none;">
            <h3>Destaques Irresistíveis ✨</h3>
            <div id="carrossel-janela" class="carrossel-container">
                <!-- Slides injetados de forma inteligente via JS -->
            </div>
        </div>

        <!-- CONTAINER DA VITRINE PRINCIPAL -->
        <div class="container">
            <div id="loading" class="loading">Carregando vitrine de delícias...</div>
            <div id="vitrine" class="vitrine" style="display: none;"></div>
        </div>

        <!-- POPUP / MODAL MERCADO LIVRE -->
        <!-- Adicionamos o style="display: none;" para ele começar escondido -->
        <div id="modal-produto" class="modal" onclick="fecharModalExterno(event)" style="display: none;">
            <div class="modal-conteudo">
                <span class="fechar-popup" onclick="fecharModal()">&times;</span>

                <div class="produto-container">
                    <div class="galeria-area">
                        <div id="wrapper-miniaturas" class="miniaturas-laterais"></div>
                        <div class="foto-principal-container">
                            <img id="foto-grande" src="" alt="Foto do bolo em destaque">
                        </div>
                    </div>

                    <div class="detalhes-area">
                        <div>
                            <h2 id="modal-nome-bolo">Nome do Bolo</h2>
                            <p id="modal-sabor-bolo" class="detalhes-sabor">Sabor</p>
                            <div id="modal-preco-bolo" class="detalhes-preco">R$ 0,00</div>
                        </div>

                        <a id="modal-btn-whatsapp" href="#" target="_blank" class="btn-whatsapp"
                            style="text-align: center; justify-content: center;">
                            Encomendar este Bolo no WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <footer>
            <a href="admin.html" target="_blank">🔐 Área Administrativa</a>
        </footer>


        <script src="index.js" defer></script>


    </body>

</html>
